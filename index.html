<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nokuphila's Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f9;
      color: #333;
      line-height: 1.6;
    }
    header {
      background: #4a90e2;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 2.5rem;
    }
    section {
      padding: 30px 20px;
      max-width: 800px;
      margin: auto;
    }
    h2 {
      color: #4a90e2;
      border-bottom: 2px solid #4a90e2;
      padding-bottom: 5px;
    }
    .skills, .projects {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      flex: 1 1 200px;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #333;
      color: white;
      margin-top: 30px;
    }
    a {
            color: #4a90e2;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>Nokuphila's Portfolio</h1>
    <p>Website design and development projects</p>
  </header>

  <section>
    <h2>About Me</h2>
    <p>I design and build websites using HTML, CSS, Canva, and Excel.</p>
  </section>

  <section>
    <h2>Skills</h2>
    <div class="skills">
      <div class="card">HTML</div>
      <div class="card">CSS</div>
      <div class="card">Canva</div>
      <div class="card">Excel</div>
    </div>
  </section>

  <section>
    <h2>Projects</h2>
    <div class="projects">
      <div class="card">Project 1 - Portfolio Website</div>
      <div class="card">Project 2 - Business Flyer</div>
    </div>
  </section>

  <footer>
    <p>© 2026 Nokuphila | Contact: your-email@example.com</p>
  </footer>
</body>
</html>
